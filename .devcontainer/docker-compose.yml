volumes:
  rider-postgres-data:
  ride-postgres-data:
  matching-postgres-data:
  pgadmin-data:
  redis-data:
  redisinsight-data:

networks:
  rideshare-network:
    driver: bridge


services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    # env_file:
        # Ensure that the variables in .env match the same variables in devcontainer.json
        # - .env
    volumes:
      - ../..:/workspaces:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    networks: 
      - rideshare-network    

  # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
  # (Adding the "ports" property to this file will not forward from a Codespace.)

  # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
  # (Adding the "ports" property to this file will not forward from a Codespace.)



  # ============================================
  # SERVICES
  # ============================================
  ride-service:
    build:
      context: ..
      dockerfile: services/ride/Dockerfile
    env_file:
      - .env
    environment:
      - SERVICE_NAME=ride-service
      - GRPC_PORT=50051
      - DB_HOST=ride-db
      - DB_PORT=5432
      - DB_NAME=ride_db
      - RIDER_SERVICE_ADDR=rider-service:50052
      - MATCHING_SERVICE_ADDR=matching-service:50053
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ride-db:5432/ride_db
    ports:
      - "50051:50051"
    depends_on:
      ride-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rideshare-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  ride-db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ride_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ride_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ride-postgres-data:/var/lib/postgresql/
      # tables
      - ../services/ride/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5433:5432"
    networks:
      - rideshare-network



  rider-service:
    build:
      context: ..
      dockerfile: services/rider/Dockerfile
    env_file:
      - .env
    environment:
      - SERVICE_NAME=rider-service
      - GRPC_PORT=50052
      - DB_HOST=rider-db
      - DB_PORT=5432
      - DB_NAME=rider_db
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@rider-db:5432/rider_db
    ports:
      - "50052:50052"
    depends_on:
      rider-db:
        condition: service_healthy
      ride-service:
        condition: service_started
    networks:
      - rideshare-network
    restart: on-failure # Don't auto-restart during crash testing

  rider-db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: rider_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d rider_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - rider-postgres-data:/var/lib/postgresql/
      # create tables
      - ../services/rider/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      # seed
      - ../services/rider/data/seed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5434:5432"
    networks:
      - rideshare-network


  matching-service:
    build:
      context: ..
      dockerfile: services/matching/Dockerfile
    env_file:
      - .env
    environment:
      - SERVICE_NAME=matching-service
      - GRPC_PORT=50053
      - DB_HOST=matching-db
      - DB_PORT=5432
      - DB_NAME=matching_db
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@matching-db:5432/matching_db
    ports:
      - "50053:50053"
    depends_on:
      matching-db:
        condition: service_healthy
      ride-service:
        condition: service_started
    networks:
      - rideshare-network
    restart: on-failure # Don't auto-restart during crash testing
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50053"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s


  matching-db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: matching_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d matching_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - matching-postgres-data:/var/lib/postgresql/
      # create tables
      - ../services/matching/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      # seed
      - ../services/matching/data/seed/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5435:5432"
    networks:
      - rideshare-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rideshare-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      - redis
    networks:
      - rideshare-network

  # Common
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - rideshare-network